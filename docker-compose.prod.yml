  #   networks:
  #     - laravel_network

  app:
    build:
      context: .
      dockerfile: _docker/app/Dockerfile
    container_name: laradocker_app
    ports:
      - "9000:9000"
    volumes:
      - /var/www/laradocker09.01.26:/var/www
    depends_on:
      - db
    networks:
      - laravel_network

  db:
    image: mysql:8.0
    container_name: project_db
    restart: unless-stopped
    ports:
      - "8203:3306"
    environment:
      MYSQL_DATABASE: lardocker
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel_network

volumes:
  dbdata:

networks:
  laravel_network:
    driver: bridge